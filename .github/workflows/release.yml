name: Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create github_config.dart from secrets
        run: |
          cat > lib/core/github_config.dart << 'EOF'
          const String githubIssueToken = '${{ secrets.GITHUB_ISSUE_TOKEN }}';
          EOF

      - name: Create kftc_config.dart from secrets
        run: |
          cat > lib/core/kftc_config.dart << 'EOF'
          const String kftcClientId = '${{ secrets.KFTC_CLIENT_ID }}';
          const String kftcClientSecret = '${{ secrets.KFTC_CLIENT_SECRET }}';
          const String kftcRedirectUri = 'https://kmgoanbulmxmeuzmxmnv.supabase.co/functions/v1/kftc-callback';
          const String kftcBaseUrl = 'https://testapi.openbanking.or.kr';
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: "카드레이더 ${{ github.ref_name }}"
          body: |
            ## 카드레이더 ${{ github.ref_name }}

            ### 변경 사항
            - MVP A 배포: 카드 등록 + 카테고리별 혜택 카드 추천

            ### 설치 방법
            1. `app-release.apk` 다운로드
            2. Android 기기에서 알 수 없는 출처 허용
            3. APK 설치
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
