name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create kftc_config.dart
        run: |
          cat > lib/core/kftc_config.dart << 'EOF'
          const String kftcClientId = '${{ secrets.KFTC_CLIENT_ID }}';
          const String kftcClientSecret = '${{ secrets.KFTC_CLIENT_SECRET }}';
          const String kftcRedirectUri = 'https://kmgoanbulmxmeuzmxmnv.supabase.co/functions/v1/kftc-callback';
          const String kftcBaseUrl = 'https://testapi.openbanking.or.kr';
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build APK (debug)
        run: flutter build apk --debug
