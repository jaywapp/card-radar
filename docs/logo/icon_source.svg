<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Portrait card: 300×490, centered at (512,480) → x=362 y=235 -->
  <!-- Fan pivot: (512, 980) -->

  <!-- Card left -30° -->
  <g transform="rotate(-30, 512, 980)">
    <rect x="362" y="235" width="300" height="490" rx="36" fill="#1565C0" opacity="0.40"/>
  </g>

  <!-- Card right +30° -->
  <g transform="rotate(30, 512, 980)">
    <rect x="362" y="235" width="300" height="490" rx="36" fill="#1565C0" opacity="0.40"/>
  </g>

  <!-- Center card — selected, solid, on top -->
  <rect x="362" y="235" width="300" height="490" rx="36" fill="#1565C0"/>

</svg>
